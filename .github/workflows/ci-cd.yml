name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# ──────────────────────────────────────────────────────────────────────────────
# Job 1: Typecheck & lint
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: streampay/package-lock.json

      - name: Install dependencies
        working-directory: streampay
        run: npm ci

      - name: Typecheck
        working-directory: streampay
        run: npx tsc --noEmit

      - name: Lint
        working-directory: streampay
        run: npm run lint

# ──────────────────────────────────────────────────────────────────────────────
# Job 2: Build Docker image and push to Docker Hub (push to main only)
# ──────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      APP_IMAGE: ${{ secrets.DOCKER_USERNAME }}/syndichain:latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.APP_IMAGE }}
          cache-from: type=gha,scope=syndichain
          cache-to: type=gha,mode=max,scope=syndichain

# ──────────────────────────────────────────────────────────────────────────────
# Job 3: Deploy via Docker Compose (app + Redis) to Ubuntu server
# ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Ubuntu Server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      APP_IMAGE: ${{ secrets.DOCKER_USERNAME }}/syndichain:latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: $HOME/syndichain/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_IMAGE
          script: |
            set -e
            echo "=== Deployment started: $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="

            APP_DIR="$HOME/syndichain"
            APP_ENV="$APP_DIR/.env.app"

            if [ ! -f "$APP_ENV" ]; then
              echo "ERROR: Missing env file: $APP_ENV"
              exit 1
            fi

            cd "$APP_DIR"

            # Pull latest app image
            echo "Pulling image..."
            docker pull "$APP_IMAGE"

            # Bring up Redis + app with compose (Redis starts first, app waits for healthy Redis)
            echo "Starting services..."
            APP_IMAGE="$APP_IMAGE" docker compose --env-file "$APP_ENV" up -d --remove-orphans

            # Wait for app to become healthy (max 2 min)
            echo "Waiting for app to become healthy..."
            for i in $(seq 1 24); do
              if curl -fsS http://127.0.0.1/ >/dev/null 2>&1; then
                echo "App healthy after $((i * 5))s"
                break
              fi
              if [ "$i" -eq 24 ]; then
                echo "ERROR: App did not become healthy in 120s"
                docker compose logs --tail 100
                exit 1
              fi
              sleep 5
            done

            docker image prune -f

            echo ""
            echo "=== Running containers ==="
            docker compose ps
            echo ""
            echo "=== Deployment complete: $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd "$HOME/syndichain"
            echo "=== Post-deploy verification ==="

            for svc in app redis; do
              status=$(docker compose ps --format json 2>/dev/null | python3 -c "import sys,json; d=[x for x in json.load(sys.stdin) if x['Service']=='$svc']; print(d[0]['State'] if d else 'not found')" 2>/dev/null || echo "unknown")
              echo "OK: syndichain-$svc → $status"
            done

            curl -fsS http://127.0.0.1/ >/dev/null && echo "HTTP: 200 OK" || echo "HTTP: FAIL"
            echo "All services healthy."
